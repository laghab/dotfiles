# ========================================
# APPEARANCE
# ========================================
font_family JetBrainsMono Nerd Font
font_size 10.0
cursor_shape block
cursor_blink_interval 0
window_padding_width 0
background_opacity 1
dynamic_background_opacity no
wm_class kitty

# ========================================
# TABS
# ========================================
tab_bar_style powerline
tab_bar_edge bottom
tab_separator " | "

map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# ========================================
# MOUSE
# ========================================
copy_on_select clipboard
mouse_map right press ungrabbed noop
mouse_map right release ungrabbed paste_from_clipboard

# ========================================
# SCROLLING & NAVIGATION
# ========================================
wheel_scroll_multiplier 5.0
inactive_text_alpha 0.8

# Quick scroll with keyboard
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

# ========================================
# FONT SIZE (handy for demos / readability)
# ========================================
map ctrl+plus font_size +2
map ctrl+equal font_size +2
map ctrl+minus font_size -2
map ctrl+0 font_size 10

# ========================================
# PERFORMANCE
# ========================================
sync_to_monitor yes
remember_window_size yes
initial_window_width 800
initial_window_height 600

# ========================================
# THEME
# ========================================
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
