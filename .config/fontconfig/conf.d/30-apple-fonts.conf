<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <alias>
  <family>-apple-system</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>San Francisco</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>San Francisco Display</family>
  <prefer>
   <family>Inter Display</family>
  </prefer>
 </alias>
 <alias>
  <family>San Francisco Text</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>BlinkMacSystemFont</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>SF Pro</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>SF Pro Text</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>SF Pro Display</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>SF Mono</family>
  <prefer>
   <family>JetBrainsMonoNL Nerd Font</family>
  </prefer>
 </alias>
 <alias>
  <family>Helvetica Neue</family>
  <prefer>
   <family>Inter</family>
  </prefer>
 </alias>
 <alias>
  <family>Apple Color Emoji</family>
  <prefer>
   <family>Noto Color Emoji</family>
  </prefer>
 </alias>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
 <dir>~/.local/share/fonts</dir>
</fontconfig>
